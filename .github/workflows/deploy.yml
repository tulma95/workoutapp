name: Test, Build & Push

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: deploy

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run deploy.sh
        run: ./deploy.sh
        env:
          GHCR_USER: ${{ github.repository_owner }}

      # deploy.sh has already built + pushed the image to ghcr.io; tell Coolify to
      # pull it and redeploy. Uses Coolify's API deploy endpoint:
      #   COOLIFY_URL            e.g. https://coolify.example.com
      #   COOLIFY_RESOURCE_UUID  the application's UUID in Coolify
      #   COOLIFY_API_TOKEN      a Coolify API token with deploy permission
      - name: Redeploy on Coolify
        # force=true so Coolify actually re-pulls the moved :latest tag rather
        # than restarting the old image (a known Coolify gotcha with mutable tags).
        run: |
          curl --fail --silent --show-error --request GET \
            "${COOLIFY_URL}/api/v1/deploy?uuid=${COOLIFY_RESOURCE_UUID}&force=true" \
            --header "Authorization: Bearer ${COOLIFY_API_TOKEN}"
        env:
          COOLIFY_URL: ${{ secrets.COOLIFY_URL }}
          COOLIFY_RESOURCE_UUID: ${{ secrets.COOLIFY_RESOURCE_UUID }}
          COOLIFY_API_TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
